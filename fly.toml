app = 'dashi-ai'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  processes = ['app']

[[mounts]]
  source = "dashi_data"
  destination = "/app/data"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512